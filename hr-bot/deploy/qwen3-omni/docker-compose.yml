version: '3.8'

services:
  qwen3-omni:
    image: vllm/vllm-openai:latest
    container_name: qwen3-omni
    ports:
      - "8004:8000"
    volumes:
      - ./models:/root/.cache/modelscope  # ModelScope 模型缓存目录
      - /tmp:/tmp
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - MODELSCOPE_CACHE=/root/.cache/modelscope
      - VLLM_USE_MODELSCOPE=True  # 启用 ModelScope 下载
      - HF_ENDPOINT=https://hf-mirror.com  # 使用镜像站
    command: >
      --model Qwen/Qwen3-Omni-7B
      --dtype float16
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.85
      --max-model-len 4096
      --trust-remote-code
      --enable-chunked-prefill
      --max-num-seqs 1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    # 注意：当前GPU显存紧张，可能需要停止其他服务或调整参数
