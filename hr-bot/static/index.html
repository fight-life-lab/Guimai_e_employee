<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人岗适配评估系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .result {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            min-height: 200px;
            white-space: pre-wrap;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            overflow-x: auto;
        }
        
        .result.loading {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }
        
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .tab:hover:not(.active) {
            background: #f0f0f0;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .info-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .info-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .score-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .score-high {
            background: #d4edda;
            color: #155724;
        }
        
        .score-medium {
            background: #fff3cd;
            color: #856404;
        }
        
        .score-low {
            background: #f8d7da;
            color: #721c24;
        }
        
        .stream-output {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .status-bar {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        .status-online {
            background: #28a745;
        }
        
        .status-offline {
            background: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>人力数字员工</h1>
            <p>基于国央企员工人岗适配管理体系的智能评估系统</p>
            <div style="margin-top: 20px;">
                <a href="/static/chat.html" style="display: inline-block; background: white; color: #667eea; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: all 0.3s;">
                    💬 进入智能对话
                </a>
            </div>
        </div>
        
        <div class="card">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('analyze')">单人分析</div>
                <div class="tab" onclick="switchTab('stream')">流式分析</div>
                <div class="tab" onclick="switchTab('compare')">多人对比</div>
                <div class="tab" onclick="switchTab('dimensions')">评估维度</div>
            </div>
            
            <!-- 单人分析 -->
            <div id="analyze" class="tab-content active">
                <h2>员工人岗适配分析</h2>
                <div class="input-group">
                    <input type="text" id="employeeName" placeholder="请输入员工姓名（如：张三）">
                    <button class="btn btn-primary" onclick="analyzeEmployee()">开始分析</button>
                </div>
                <div id="analyzeResult" class="result" style="display: none;"></div>
            </div>
            
            <!-- 流式分析 -->
            <div id="stream" class="tab-content">
                <h2>实时流式分析</h2>
                <div class="input-group">
                    <input type="text" id="streamEmployeeName" placeholder="请输入员工姓名">
                    <button class="btn btn-primary" onclick="streamAnalyze()">开始流式分析</button>
                </div>
                <div id="streamOutput" class="stream-output" style="display: none;"></div>
            </div>
            
            <!-- 多人对比 -->
            <div id="compare" class="tab-content">
                <h2>多人适配度对比</h2>
                <div class="input-group">
                    <input type="text" id="compareNames" placeholder="请输入员工姓名，用逗号分隔（如：张三,李四,王五）">
                    <button class="btn btn-primary" onclick="compareEmployees()">开始对比</button>
                </div>
                <div id="compareResult" class="result" style="display: none;"></div>
            </div>
            
            <!-- 评估维度 -->
            <div id="dimensions" class="tab-content">
                <h2>人岗适配评估维度</h2>
                <div id="dimensionsContent" class="info-grid"></div>
            </div>
        </div>
        
        <div class="status-bar">
            <div class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">检查服务状态...</span>
            </div>
            <div>
                <span>API文档: </span>
                <a href="/docs" target="_blank">/docs</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        
        // 切换标签页
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            
            if (tabId === 'dimensions') {
                loadDimensions();
            }
        }
        
        // 检查服务状态
        async function checkStatus() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                if (response.ok) {
                    document.getElementById('statusDot').className = 'status-dot status-online';
                    document.getElementById('statusText').textContent = '服务运行正常';
                } else {
                    throw new Error('Service unavailable');
                }
            } catch (error) {
                document.getElementById('statusDot').className = 'status-dot status-offline';
                document.getElementById('statusText').textContent = '服务离线';
            }
        }
        
        // 分析单个员工
        async function analyzeEmployee() {
            const name = document.getElementById('employeeName').value.trim();
            if (!name) {
                alert('请输入员工姓名');
                return;
            }
            
            const resultDiv = document.getElementById('analyzeResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>正在分析中，请稍候...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/v1/alignment/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employee_name: name, include_details: true })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    let html = `<strong>员工：${data.employee_name}</strong>\n`;
                    html += `分析日期：${data.analysis_date}\n\n`;
                    
                    if (data.overall_score !== null) {
                        const scoreClass = data.overall_score >= 80 ? 'score-high' : 
                                         data.overall_score >= 60 ? 'score-medium' : 'score-low';
                        html += `综合评分：${data.overall_score}分 `;
                        html += `<span class="score-badge ${scoreClass}">${data.alignment_level || '未知'}</span>\n\n`;
                    }
                    
                    if (Object.keys(data.dimension_scores).length > 0) {
                        html += '各维度评分：\n';
                        for (const [dim, score] of Object.entries(data.dimension_scores)) {
                            html += `  - ${dim}: ${score}分\n`;
                        }
                        html += '\n';
                    }
                    
                    if (data.raw_analysis) {
                        html += '详细分析报告：\n';
                        html += '='.repeat(50) + '\n';
                        html += data.raw_analysis;
                    }
                    
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = `错误：${data.detail || '分析失败'}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `请求失败：${error.message}`;
            }
        }
        
        // 流式分析
        async function streamAnalyze() {
            const name = document.getElementById('streamEmployeeName').value.trim();
            if (!name) {
                alert('请输入员工姓名');
                return;
            }
            
            const outputDiv = document.getElementById('streamOutput');
            outputDiv.style.display = 'block';
            outputDiv.textContent = '';
            
            try {
                const response = await fetch(`${API_BASE}/api/v1/alignment/analyze/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employee_name: name })
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.chunk) {
                                    outputDiv.textContent += data.chunk;
                                    outputDiv.scrollTop = outputDiv.scrollHeight;
                                }
                                if (data.done) {
                                    outputDiv.textContent += '\n\n[分析完成]';
                                }
                            } catch (e) {
                                // 忽略解析错误
                            }
                        }
                    }
                }
            } catch (error) {
                outputDiv.textContent = `流式分析失败：${error.message}`;
            }
        }
        
        // 对比多个员工
        async function compareEmployees() {
            const namesInput = document.getElementById('compareNames').value.trim();
            if (!namesInput) {
                alert('请输入员工姓名');
                return;
            }
            
            const names = namesInput.split(',').map(n => n.trim()).filter(n => n);
            if (names.length < 2) {
                alert('请至少输入两个员工姓名');
                return;
            }
            
            const resultDiv = document.getElementById('compareResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>正在对比分析中...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/v1/alignment/compare`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employee_names: names })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    let html = '员工适配度对比结果\n';
                    html += '='.repeat(50) + '\n\n';
                    
                    if (data.scores) {
                        html += '综合评分对比：\n';
                        for (const [name, score] of Object.entries(data.scores)) {
                            const bar = '█'.repeat(Math.round(score / 5));
                            html += `${name}: ${score}分 ${bar}\n`;
                        }
                        html += '\n';
                    }
                    
                    if (data.levels) {
                        html += '适配等级：\n';
                        for (const [name, level] of Object.entries(data.levels)) {
                            html += `${name}: ${level}\n`;
                        }
                    }
                    
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = `错误：${data.detail || '对比失败'}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `请求失败：${error.message}`;
            }
        }
        
        // 加载评估维度
        async function loadDimensions() {
            const contentDiv = document.getElementById('dimensionsContent');
            
            try {
                const response = await fetch(`${API_BASE}/api/v1/alignment/dimensions`);
                const data = await response.json();
                
                let html = '';
                
                if (data.dimensions) {
                    for (const [key, value] of Object.entries(data.dimensions)) {
                        html += `
                            <div class="info-card">
                                <h3>${key} (权重${Math.round(value.weight * 100)}%)</h3>
                                <p>${value.description}</p>
                                <ul style="margin-top: 10px; padding-left: 20px;">
                        `;
                        
                        if (value.indicators) {
                            for (const indicator of value.indicators) {
                                html += `<li>${indicator.name}`;
                                if (indicator.weight) {
                                    html += ` (${Math.round(indicator.weight * 100)}%)`;
                                }
                                if (indicator.description) {
                                    html += ` - ${indicator.description}`;
                                }
                                html += '</li>';
                            }
                        }
                        
                        html += '</ul></div>';
                    }
                }
                
                contentDiv.innerHTML = html;
            } catch (error) {
                contentDiv.innerHTML = `<p style="color: red;">加载失败：${error.message}</p>`;
            }
        }
        
        // 初始化
        checkStatus();
        setInterval(checkStatus, 30000); // 每30秒检查一次状态
    </script>
</body>
</html>
