<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>API测试</title>
</head>
<body>
    <h1>API测试页面</h1>
    <div id="result"></div>
    
    <script>
        const API_BASE = window.location.origin;
        console.log('API_BASE:', API_BASE);
        
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            try {
                console.log('正在调用API...');
                const response = await fetch(`${API_BASE}/api/v1/interview/projects?evaluation_type=employee`);
                console.log('响应状态:', response.status);
                const data = await response.json();
                console.log('响应数据:', data);
                
                if (data.projects && data.projects.length > 0) {
                    resultDiv.innerHTML = `<p>✅ API调用成功！</p><p>项目列表: ${data.projects.join(', ')}</p>`;
                } else {
                    resultDiv.innerHTML = '<p>❌ 项目列表为空</p>';
                }
            } catch (error) {
                console.error('API调用失败:', error);
                resultDiv.innerHTML = `<p>❌ API调用失败: ${error.message}</p>`;
            }
        }
        
        testAPI();
    </script>
</body>
</html>
